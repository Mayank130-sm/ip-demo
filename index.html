<!DOCTYPE html>
<html>
<head>
    <title>BioMed Knowledge Explorer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.21.1/cytoscape.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 300px; border-right: 1px solid #ddd; padding: 20px; overflow-y: auto; background: #fdfdfd; }
        #main { flex-grow: 1; display: flex; flex-direction: column; }
        #controls { padding: 15px; border-bottom: 1px solid #ddd; background: #fff; }
        #cy { flex-grow: 1; background: #fafafa; }
        .prop-item { margin-bottom: 10px; font-size: 0.9em; }
        .prop-label { font-weight: bold; color: #555; display: block; }
        input, select, button { padding: 8px; margin-right: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Node Details</h3>
    <div id="details-content">Click a node to view properties.</div>
</div>

<div id="main">
    <div id="controls">
        <input type="text" id="searchBox" placeholder="Search drug, gene, or disease...">
        <select id="typeFilter">
            <option value="">All Types</option>
            <option value="Drug">Drugs</option>
            <option value="Gene">Genes</option>
            <option value="Disease">Diseases</option>
        </select>
        <button onclick="loadGraph()">Apply</button>
    </div>
    <div id="cy"></div>
</div>

<script>
let cy;

function loadGraph() {
    const search = document.getElementById('searchBox').value;
    const type = document.getElementById('typeFilter').value;
    const url = `api.php?search=${encodeURIComponent(search)}&type=${type}`;

    fetch(url)
        .then(res => res.json())
        .then(elements => {
            cy = cytoscape({
                container: document.getElementById('cy'),
                elements: elements,
                style: [
                    { selector: 'node', style: { 'label': 'data(label)', 'text-valign': 'center', 'color': '#000', 'font-size': '10px' } },
                    { selector: 'node[type="Drug"]', style: { 'background-color': '#FF4136', 'shape': 'rectangle' } },
                    { selector: 'node[type="Gene"]', style: { 'background-color': '#2ECC40', 'shape': 'ellipse' } },
                    { selector: 'node[type="Disease"]', style: { 'background-color': '#FFDC00', 'shape': 'triangle' } },
                    { selector: 'edge', style: { 'label': 'data(label)', 'width': 2, 'line-color': '#ccc', 'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'font-size': '8px' } }
                ],
                layout: { name: 'cose', padding: 30 }
            });

            // DETAILS PANEL LOGIC
            cy.on('tap', 'node', function(evt){
                const props = evt.target.data('properties');
                const detailContainer = document.getElementById('details-content');
                let html = `<h4>${props.name || props.symbol}</h4>`;
                
                // Dynamically render properties based on your schema
                for (const [key, value] of Object.entries(props)) {
                    if (key.startsWith('@')) continue; // Skip internal ArcadeDB metadata
                    html += `<div class="prop-item">
                                <span class="prop-label">${key.replace('_', ' ').toUpperCase()}</span>
                                <span>${value}</span>
                             </div>`;
                }
                detailContainer.innerHTML = html;
            });
        });
}

// Initial load
loadGraph();
</script>
</body>
</html>
